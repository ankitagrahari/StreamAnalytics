apiVersion: apps/v1
kind: Deployment
metadata:
  name: streams
  namespace: streammetrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: streams
  template:
    metadata:
      labels:
        app: streams
    spec:
      containers:
      - name: streams
        image: streammetrics-streams:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8082
        env:
        - name: SPRING_CONFIG_LOCATION
          value: "classpath:/application.yml,/config/application.yml"
        - name: SPRING_DATA_REDIS_CLIENT_TYPE
          value: "lettuce"
        - name: MANAGEMENT_HEALTH_REDIS_ENABLED
          value: "false"
        volumeMounts:
        - name: config
          mountPath: /config
        resources:
          requests:
            memory: "768Mi"
            cpu: "500m"
          limits:
            memory: "1.5Gi"
            cpu: "1000m"
      volumes:
      - name: config
        configMap:
          name: streams-config